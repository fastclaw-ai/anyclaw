<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #34c759; }
    .dot.disconnected { background: #ff3b30; }
    .dot.connecting { background: #ff9500; }
    .hint {
      margin-top: 12px;
      padding: 8px;
      background: #f0f4ff;
      border-radius: 6px;
      font-size: 12px;
      color: #555;
      display: none;
    }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
    }
    .footer a { color: #007aff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AnyClaw</h1>
  </div>
  <div class="status-row">
    <span id="dot" class="dot disconnected"></span>
    <span id="status"><strong>Checking...</strong></span>
  </div>
  <div id="hint" class="hint">
    The extension connects automatically when you run <code>anyclaw daemon start</code>.
  </div>
  <div class="footer">
    <a href="https://github.com/fastclaw-ai/anyclaw" target="_blank">github.com/fastclaw-ai/anyclaw</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
