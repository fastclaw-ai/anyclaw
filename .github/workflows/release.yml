name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/fastclaw-ai/anyclaw/internal/version.Version=${VERSION} -X github.com/fastclaw-ai/anyclaw/internal/version.Commit=${COMMIT} -X github.com/fastclaw-ai/anyclaw/internal/version.Date=${DATE}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"
            output="anyclaw"
            if [ "$GOOS" = "windows" ]; then
              output="anyclaw.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "$output" .

            if [ "$GOOS" = "windows" ]; then
              zip "dist/anyclaw_${GOOS}_${GOARCH}.zip" "$output"
            else
              tar czf "dist/anyclaw_${GOOS}_${GOARCH}.tar.gz" "$output"
            fi
            rm -f "$output"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
