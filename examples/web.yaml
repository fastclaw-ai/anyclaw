# anyclaw pipeline format - single file, multiple commands
anyclaw: "1.0"
name: hackernews
description: Hacker News data tools

commands:
  - name: top
    description: Top stories
    args:
      limit:
        type: int
        default: 20
        description: Number of stories
    pipeline:
      - fetch:
          url: https://hacker-news.firebaseio.com/v0/topstories.json
      - limit: "${{ Math.min((args.limit ? args.limit : 20) + 10, 50) }}"
      - map:
          id: ${{ item }}
      - fetch:
          url: https://hacker-news.firebaseio.com/v0/item/${{ item.id }}.json
      - filter: item.title && !item.deleted && !item.dead
      - map:
          rank: ${{ index + 1 }}
          title: ${{ item.title }}
          score: ${{ item.score }}
          author: ${{ item.by }}
      - limit: ${{ args.limit }}
    columns: [rank, title, score, author]

  - name: search
    description: Search stories
    args:
      query:
        type: string
        required: true
        description: Search query
      limit:
        type: int
        default: 20
        description: Number of results
    pipeline:
      - fetch:
          url: https://hn.algolia.com/api/v1/search
          params:
            query: ${{ args.query }}
            tags: story
            hitsPerPage: ${{ args.limit }}
      - select: hits
      - map:
          rank: ${{ index + 1 }}
          title: ${{ item.title }}
          score: ${{ item.points }}
          author: ${{ item.author }}
          url: ${{ item.url }}
      - limit: ${{ args.limit }}
    columns: [rank, title, score, author, url]
