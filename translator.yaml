# translator.yaml
name: translator
description: "Translation service"

backend:
  type: http
  base_url: https://api.mymemory.translated.net

skills:
  - name: translate
    description: "Translate text between languages"
    input:
      q:
        type: string
        required: true
        description: "Text to translate"
      langpair:
        type: string
        required: true
        description: "Language pair (e.g. en|zh)"
        default: "en|zh"
    backend:
      method: GET
      path: /get